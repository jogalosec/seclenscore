[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "S",   # flake8-bandit (seguridad: detecta SQL injection, secrets, etc.)
    "B",   # flake8-bugbear
    "I",   # isort
    "UP",  # pyupgrade
]
# Permitir assert en tests y S101 en general por compatibilidad con pytest
ignore = ["S101"]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["S101", "S106"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
filterwarnings = ["ignore::DeprecationWarning"]

[tool.coverage.run]
source = ["app"]
omit = ["tests/*", "app/main.py"]

[tool.coverage.report]
fail_under = 80
show_missing = true
