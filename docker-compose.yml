services:

  # ---------------------------------------------------------------
  # Backend FastAPI
  # ---------------------------------------------------------------
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: seclenscore-api
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      # Montar includes/ en modo solo lectura para acceder a privatekey.pem
      - ./includes:/app/includes:ro
    networks:
      - seclenscore-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ---------------------------------------------------------------
  # Frontend Vue.js (servido por nginx)
  # ---------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: seclenscore-frontend
    ports:
      - "80:80"
    depends_on:
      - api
    networks:
      - seclenscore-net
    restart: unless-stopped

networks:
  seclenscore-net:
    driver: bridge
